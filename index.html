<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Shop Pro - Ledger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF8C00; /* Dark Orange */
            --accent: #FFA500; /* Light Orange */
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #2d3436;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Header Area */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; padding: 20px; text-align: center;
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }

        .container { flex: 1; overflow-y: auto; padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: -30px; }
        .card { 
            background: var(--white); border-radius: 15px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-val { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        /* Balance Card */
        .balance-card { text-align: center; margin: 15px 0; background: var(--white); }
        .balance-val { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* Tabs UI */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Styling */
        label { font-size: 0.85rem; color: #636e72; font-weight: 600; }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0 15px; border-radius: 10px;
            border: 1.5px solid #eee; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        .btn-main { 
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 140, 0, 0.2);
        }

        /* History List */
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid #f1f1f1;
        }
        .item-info { display: flex; flex-direction: column; }
        .item-desc { font-weight: 600; font-size: 0.95rem; }
        .item-date { font-size: 0.75rem; color: #999; }
        .amt-inc { color: var(--success); font-weight: bold; }
        .amt-exp { color: var(--danger); font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav {
            background: var(--white); display: flex; justify-content: space-around;
            padding: 10px 0 20px; border-top: 1px solid #eee;
        }
        .nav-item { border: none; background: none; color: #b2bec3; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; }
        .nav-item span { display: block; font-size: 0.7rem; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-header">
    <h2 style="margin:0">Print Shop Pro</h2>
    <p style="margin:5px 0 20px; font-size: 0.8rem; opacity: 0.9;">Financial Ledger & Insights</p>
</div>

<div class="container">
    
    <div id="tab-home" class="tab-content active">
        <div class="summary-grid">
            <div class="card">
                <label><i class="fa-solid fa-arrow-down" style="color:var(--success)"></i> ရငွေ</label>
                <div class="stat-val" id="sum-inc">0</div>
            </div>
            <div class="card">
                <label><i class="fa-solid fa-arrow-up" style="color:var(--danger)"></i> အသုံးစရိတ်</label>
                <div class="stat-val" id="sum-exp">0</div>
            </div>
        </div>

        <div class="card balance-card">
            <label>ကျန်ငွေ / အမြတ်</label>
            <div class="balance-val" id="sum-net">0</div>
        </div>

        <div class="card">
            <h4 style="margin-top:0">သုံးသပ်ချက် (Chart)</h4>
            <canvas id="mainChart" height="200"></canvas>
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="card">
            <h3>စာရင်းအသစ်ထည့်ရန်</h3>
            <label>အမျိုးအစား ရွေးချယ်ပါ</label>
            <select id="type">
                <option value="income">ရငွေ (Income)</option>
                <option value="expense">အသုံးစရိတ် (Expense)</option>
            </select>

            <label>အကြောင်းအရာ</label>
            <input type="text" id="desc" placeholder="ဥပမာ- ကာလာပရင့် ၅၀ ရွက်">

            <label>ပမာဏ (ကျပ်)</label>
            <input type="number" id="amount" placeholder="0">

            <button class="btn-main" onclick="saveEntry()">သိမ်းဆည်းမည်</button>
        </div>
    </div>

    <div id="tab-list" class="tab-content">
        <div class="card" style="padding: 0;">
            <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                <h3 style="margin:0">မှတ်တမ်းများ</h3>
                <button onclick="exportCSV()" style="background:none; border:none; color:var(--primary); font-size: 1.2rem;"><i class="fa-solid fa-file-export"></i></button>
            </div>
            <div id="list-container">
                </div>
        </div>
        <button onclick="resetData()" style="width:100%; margin-top: 20px; background:none; border:none; color:#ccc;">Clear All Data</button>
    </div>

</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home', this)">
        <i class="fa-solid fa-chart-pie"></i><span>Dashboard</span>
    </button>
    <button class="nav-item" onclick="switchTab('add', this)">
        <i class="fa-solid fa-circle-plus"></i><span>ထည့်ရန်</span>
    </button>
    <button class="nav-item" onclick="switchTab('list', this)">
        <i class="fa-solid fa-receipt"></i><span>မှတ်တမ်း</span>
    </button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('print_pro_data')) || [];
    let chartInstance = null;

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
        if(id === 'home') updateDashboard();
        if(id === 'list') renderList();
    }

    function saveEntry() {
        const type = document.getElementById('type').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const date = new Date().toLocaleString();

        if(!desc || isNaN(amount)) return alert("ကျေးဇူးပြု၍ အချက်အလက်အမှန်ထည့်ပါ။");

        entries.unshift({ type, desc, amount, date });
        localStorage.setItem('print_pro_data', JSON.stringify(entries));
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        alert("စာရင်းသွင်းပြီးပါပြီ");
        switchTab('home', document.querySelectorAll('.nav-item')[0]);
    }

    function updateDashboard() {
        let inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
        let exp = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
        
        document.getElementById('sum-inc').innerText = inc.toLocaleString();
        document.getElementById('sum-exp').innerText = exp.toLocaleString();
        document.getElementById('sum-net').innerText = (inc - exp).toLocaleString();

        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['ရငွေ', 'အသုံးစရိတ်'],
                datasets: [{
                    label: 'Amount (Ks)',
                    data: [inc, exp],
                    backgroundColor: ['#2ecc71', '#e74c3c'],
                    borderRadius: 8
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = entries.length ? '' : '<p style="text-align:center; padding:20px; color:#999;">မှတ်တမ်းမရှိသေးပါ</p>';
        
        entries.forEach((item, index) => {
            container.innerHTML += `
                <div class="history-item">
                    <div class="item-info">
                        <span class="item-desc">${item.desc}</span>
                        <span class="item-date">${item.date}</span>
                    </div>
                    <div class="${item.type === 'income' ? 'amt-inc' : 'amt-exp'}">
                        ${item.type === 'income' ? '+' : '-'}${item.amount.toLocaleString()}
                    </div>
                </div>
            `;
        });
    }

    function exportCSV() {
        let csvContent = "Date,Description,Type,Amount\n";
        entries.forEach(e => {
            csvContent += `${e.date},${e.desc},${e.type},${e.amount}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'print_shop_report.csv');
        a.click();
    }

    function resetData() {
        if(confirm("ဒေတာအားလုံးကို အပြီးဖျက်မှာလား?")) {
            localStorage.removeItem('print_pro_data');
            entries = [];
            updateDashboard();
            renderList();
        }
    }

    // Init
    updateDashboard();
</script>

</body>
</html>
