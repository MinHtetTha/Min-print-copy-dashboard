<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Shop Pro - Advanced Ledger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF8C00;
            --accent: #FFA500;
            --bg: #fdfdfd;
            --white: #ffffff;
            --text: #2d3436;
            --success: #2ecc71;
            --danger: #e74c3c;
            --gray: #95a5a6;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }

        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; padding: 25px 20px 45px; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .container { flex: 1; overflow-y: auto; padding: 0 15px; max-width: 500px; margin: 0 auto; width: 100%; position: relative; }

        /* Summary Cards */
        .summary-section { margin-top: -30px; }
        .card { 
            background: var(--white); border-radius: 15px; padding: 18px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.02);
            margin-bottom: 15px;
        }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .mini-card { background: #fffcf9; padding: 12px; border-radius: 12px; border: 1px solid #ffedda; text-align: center; }
        .mini-card label { font-size: 0.75rem; color: var(--gray); display: block; margin-bottom: 4px; }
        .mini-card span { font-weight: bold; font-size: 1rem; }

        /* Tabs UI */
        .tab-content { display: none; padding-top: 10px; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Filter styling */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-bar select, .filter-bar input { padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.85rem; flex: 1; }

        /* Input Form */
        label { font-size: 0.85rem; color: var(--text); font-weight: 600; display: block; margin-top: 10px; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px;
            border: 1.5px solid #eee; outline: none;
        }
        .btn-main { 
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* History */
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #f9f9f9;
        }
        .item-info { display: flex; flex-direction: column; }
        .item-desc { font-weight: 600; font-size: 0.95rem; }
        .item-date { font-size: 0.7rem; color: var(--gray); margin-top: 3px; }
        .amt { font-weight: 800; font-size: 1rem; }

        /* Bottom Nav */
        .bottom-nav {
            background: var(--white); display: flex; justify-content: space-around;
            padding: 10px 0 25px; border-top: 1px solid #eee;
        }
        .nav-item { border: none; background: none; color: #d1d8e0; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; }
        .nav-item span { display: block; font-size: 0.7rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-header">
    <h2 style="margin:0; letter-spacing: 1px;">PRINT SHOP PRO</h2>
    <div id="current-view-label" style="font-size: 0.8rem; margin-top: 5px; opacity: 0.9;">Dashboard Overview</div>
</div>

<div class="container">
    
    <div id="tab-home" class="tab-content active">
        <div class="summary-section">
            <div class="card">
                <div class="filter-bar">
                    <select id="dashboard-period" onchange="updateDashboard()">
                        <option value="today">ယနေ့စာရင်း</option>
                        <option value="month">ယခုလချုပ်</option>
                        <option value="year">ယခုနှစ်ချုပ်</option>
                        <option value="all">စုစုပေါင်းအားလုံး</option>
                    </select>
                </div>
                <div class="report-grid">
                    <div class="mini-card">
                        <label>ဝင်ငွေ</label>
                        <span id="sum-inc" style="color:var(--success)">0</span>
                    </div>
                    <div class="mini-card">
                        <label>ထွက်ငွေ</label>
                        <span id="sum-exp" style="color:var(--danger)">0</span>
                    </div>
                </div>
                <div style="text-align: center; padding: 10px 0;">
                    <label style="margin:0">အသားတင်အမြတ် (Net Profit)</label>
                    <div id="sum-net" style="font-size: 1.8rem; font-weight: 800; color: var(--primary);">0</div>
                </div>
            </div>

            <div class="card">
                <h4 style="margin: 0 0 15px 0; font-size: 0.9rem; color: var(--gray);">နှိုင်းယှဉ်ချက်ဇယား</h4>
                <canvas id="mainChart" height="180"></canvas>
            </div>
        </div>
    </div>

    <div id="tab-add" class="tab-content">
        <div class="card">
            <h3 style="margin-top:0">စာရင်းအသစ်ထည့်ရန်</h3>
            
            <label>နေ့စွဲ</label>
            <input type="date" id="entry-date">

            <label>အမျိုးအစား</label>
            <select id="type">
                <option value="income">ဝင်ငွေ (+) </option>
                <option value="expense">ထွက်ငွေ (-) </option>
            </select>

            <label>အကြောင်းအရာ</label>
            <input type="text" id="desc" placeholder="ဥပမာ - ကာလာပရင့် (၅၀) ရွက်">

            <label>ပမာဏ (ကျပ်)</label>
            <input type="number" id="amount" placeholder="0">

            <button class="btn-main" onclick="saveEntry()">စာရင်းသွင်းမည်</button>
        </div>
    </div>

    <div id="tab-list" class="tab-content">
        <div class="card" style="padding:0; overflow:hidden;">
            <div style="padding:15px; background: #fffcf9; border-bottom:1px solid #eee; display:flex; justify-content: space-between; align-items:center;">
                <h4 style="margin:0">မှတ်တမ်းများ</h4>
                <button onclick="exportCSV()" style="background:none; border:none; color:var(--primary);"><i class="fa-solid fa-file-export"></i> CSV</button>
            </div>
            <div id="list-container" style="max-height: 400px; overflow-y: auto;">
                </div>
        </div>
        <button onclick="resetData()" style="width:100%; margin: 15px 0; background:none; border:none; color:#bbb; font-size: 0.7rem;">RESET ALL DATA</button>
    </div>

</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home', this)">
        <i class="fa-solid fa-house-chimney"></i><span>ပင်မစာမျက်နှာ</span>
    </button>
    <button class="nav-item" onclick="switchTab('add', this)">
        <i class="fa-solid fa-plus-square"></i><span>စာရင်းသွင်း</span>
    </button>
    <button class="nav-item" onclick="switchTab('list', this)">
        <i class="fa-solid fa-rectangle-list"></i><span>မှတ်တမ်း</span>
    </button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('print_pro_v2')) || [];
    let chartInstance = null;

    // Set default date to today
    document.getElementById('entry-date').valueAsDate = new Date();

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
        
        if(id === 'home') updateDashboard();
        if(id === 'list') renderList();
        
        const labels = { 'home': 'Dashboard Overview', 'add': 'Add New Entry', 'list': 'Transaction History' };
        document.getElementById('current-view-label').innerText = labels[id];
    }

    function saveEntry() {
        const date = document.getElementById('entry-date').value;
        const type = document.getElementById('type').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);

        if(!date || !desc || isNaN(amount)) return alert("အချက်အလက်များကို မှန်ကန်စွာဖြည့်စွက်ပါ။");

        entries.unshift({ date, type, desc, amount, timestamp: new Date().getTime() });
        localStorage.setItem('print_pro_v2', JSON.stringify(entries));
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        alert("သိမ်းဆည်းပြီးပါပြီ");
        switchTab('home', document.querySelectorAll('.nav-item')[0]);
    }

    function updateDashboard() {
        const period = document.getElementById('dashboard-period').value;
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();

        let filtered = entries;

        if(period === 'today') {
            filtered = entries.filter(e => e.date === todayStr);
        } else if(period === 'month') {
            filtered = entries.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            });
        } else if(period === 'year') {
            filtered = entries.filter(e => new Date(e.date).getFullYear() === thisYear);
        }

        let inc = filtered.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
        let exp = filtered.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
        
        document.getElementById('sum-inc').innerText = inc.toLocaleString();
        document.getElementById('sum-exp').innerText = exp.toLocaleString();
        document.getElementById('sum-net').innerText = (inc - exp).toLocaleString();

        renderChart(inc, exp);
    }

    function renderChart(inc, exp) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['ဝင်ငွေ', 'ထွက်ငွေ'],
                datasets: [{
                    data: [inc, exp],
                    backgroundColor: ['#2ecc71', '#e74c3c'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: { 
                cutout: '70%',
                plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }
            }
        });
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = entries.length ? '' : '<p style="text-align:center; padding:30px; color:#ccc;">မှတ်တမ်းမရှိသေးပါ။</p>';
        
        entries.forEach((item) => {
            container.innerHTML += `
                <div class="history-item">
                    <div class="item-info">
                        <span class="item-desc">${item.desc}</span>
                        <span class="item-date">${item.date}</span>
                    </div>
                    <div class="amt" style="color: ${item.type === 'income' ? 'var(--success)' : 'var(--danger)'}">
                        ${item.type === 'income' ? '+' : '-'}${item.amount.toLocaleString()}
                    </div>
                </div>
            `;
        });
    }

    function exportCSV() {
        if(entries.length === 0) return alert("ထုတ်ယူရန် မှတ်တမ်းမရှိပါ။");
        let csv = "Date,Description,Type,Amount\n";
        entries.forEach(e => csv += `${e.date},${e.desc},${e.type},${e.amount}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `print_shop_report_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function resetData() {
        if(confirm("ဒေတာအားလုံးကို အပြီးတိုင်ဖျက်မှာ သေချာပါသလား?")) {
            localStorage.removeItem('print_pro_v2');
            entries = [];
            updateDashboard();
            renderList();
        }
    }

    updateDashboard();
</script>

</body>
</html>
